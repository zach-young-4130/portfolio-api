  "/api/v1/session":
    post:
      summary: Login (issue JWT)
      tags:
      - Sessions
      parameters: []
      responses:
        '200':
          description: logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      name:
                        type: string
                        nullable: true
                      avatar_url:
                        type: string
                        nullable: true
                      role:
                        type: string
                        enum:
                        - user
                        - admin
                    required:
                    - id
                    - email
                    - role
                  token:
                    type: string
                required:
                - user
                - token
        '401':
          description: account locked after repeated failures
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                  locked_until:
                    type: string
                    format: date-time
                required:
                - errors
                - locked_until
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
              - email
              - password
    delete:
      summary: Logout (client discards token)
      tags:
      - Sessions
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      responses:
        '204':
          description: logged out
        '401':
          description: missing or invalid token
    get:
      summary: Current session
      tags:
      - Sessions
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      name:
                        type: string
                        nullable: true
                      avatar_url:
                        type: string
                        nullable: true
                      role:
                        type: string
                        enum:
                        - user
                        - admin
                    required:
                    - id
                    - email
                    - role
                required:
                - user
        '401':
          description: unauthenticated
