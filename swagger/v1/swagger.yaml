---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/api/v1/community_items":
    get:
      summary: List community items (published only when public; all when authenticated)
      tags:
      - Community Items
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      responses:
        '200':
          description: ok (authenticated includes drafts)
          content:
            application/json:
              schema:
                type: object
                properties:
                  community_items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        title:
                          type: string
                        description:
                          type: string
                        url:
                          type: string
                          nullable: true
                        role:
                          type: string
                          nullable: true
                        year:
                          type: string
                          nullable: true
                        tech_stack:
                          type: string
                          nullable: true
                        position:
                          type: integer
                          nullable: true
                        published:
                          type: boolean
                        tags:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                              name:
                                type: string
                              slug:
                                type: string
                            required:
                            - id
                            - name
                            - slug
                      required:
                      - id
                      - title
                      - description
                      - published
                      - tags
                required:
                - community_items
    post:
      summary: Create community item
      tags:
      - Community Items
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      responses:
        '201':
          description: created
        '401':
          description: unauthenticated
        '422':
          description: invalid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                community_item:
                  type: object
                  properties:
                    id:
                      type: integer
                    title:
                      type: string
                    description:
                      type: string
                    url:
                      type: string
                      nullable: true
                    role:
                      type: string
                      nullable: true
                    year:
                      type: string
                      nullable: true
                    tech_stack:
                      type: string
                      nullable: true
                    position:
                      type: integer
                      nullable: true
                    published:
                      type: boolean
                    tags:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                          slug:
                            type: string
                        required:
                        - id
                        - name
                        - slug
                  required:
                  - id
                  - title
                  - description
                  - published
                  - tags
              required:
